spring.application.name=dvdstreaming

#SQL
spring.datasource.url=jdbc:mysql://localhost:3306/dvd_streaming?createDatabaseIfNotExist=true
spring.datasource.username=dvdstreamingapp
spring.datasource.password=temp
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#creat tables if they dont exist
spring.jpa.hibernate.ddl-auto=update

#show SQL in console
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true


#disable caching for html testing
spring.thymeleaf.cache=false



#custom

tempChunkedVideoUploadsFolderPath=src/main/resources/chunkedUploads
uploadChuckSize=8192
permanentVideoStoreDir=src/main/resources/videoFiles


